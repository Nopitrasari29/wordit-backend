version: '3.8'

services:
  # 🐘 DATABASE: PostgreSQL Engine
  database:
    image: postgres:16
    container_name: wordit-database
    restart: unless-stopped
    ports:
      # Menggunakan port 5434 sesuai .env kamu
      - "${POSTGRES_PORT}:5432" 
    environment:
      # Mapping variabel dari file .env kamu
      POSTGRES_DB: ${POSTGRES_NAME}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      # 🚀 KUNCI PERMANEN: Menyimpan data di volume 'wordit_postgres_data'
      - wordit_postgres_data:/var/lib/postgresql/data 
    healthcheck:
      # Memastikan DB siap sebelum aplikasi lain terhubung
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wordit-network

  # ⚡ CACHE: Redis Engine (untuk performa kuis)
  redis:
    image: redis:alpine
    container_name: wordit-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - wordit-network

# 🌐 JARINGAN: Agar antar service bisa saling mengobrol
networks:
  wordit-network:
    driver: bridge

# 📦 PENYIMPANAN: Definisi Volume Jangka Panjang
volumes:
  wordit_postgres_data:
    driver: local