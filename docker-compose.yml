services:
  database:
    image: postgres:16
    container_name: wordit-database
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_NAME}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wordit-network

  redis: # ✅ SEKARANG SUDAH MASUK KE DALAM BLOK SERVICES
    image: redis:alpine
    container_name: wordit-redis
    ports:
      - "6379:6379"
    networks:
      - wordit-network

networks:
  wordit-network:
    driver: bridge

volumes:
  postgres_data: